    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
        }
        /* Custom scrollbar for a modern look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        @keyframes gold-glow {
            0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 20px 10px rgba(234, 179, 8, 0.2); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); transform: scale(1); }
        }
        .animate-gold {
            animation: gold-glow 2s infinite ease-in-out;
        }
    </style>
